// ── SHARED ────────────────────────────────────────────────────
function StatRow({stats}){
  return(
    <div style={{display:'flex',gap:10,marginBottom:24,flexWrap:'wrap'}}>
      {stats.map((s,i)=>(
        <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:'10px 16px',flex:'1',minWidth:90}}>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:18,color:C.accent,fontWeight:500,marginBottom:2}}>{s.val}</div>
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.06em'}}>{s.label}</div>
        </div>
      ))}
    </div>
  )
}

function SectionHeader({title,sub}){
  return(
    <div style={{marginBottom:20}}>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontWeight:400,color:C.text,marginBottom:6}}>{title}</h2>
      {sub&&<p style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:C.muted}}>{sub}</p>}
    </div>
  )
}

// ── GAP MAP ───────────────────────────────────────────────────
function GapMap(){
  const[sel,setSel]=useState(null)
  return(
    <div>
      <SectionHeader title="Brand Intelligence Gap Map" sub="Sponsorship presence across Indian women's sports — ranked by commercial gap"/>
      <StatRow stats={[{val:'12',label:'Categories'},{val:'8',label:'Sports tracked'},{val:'$900M',label:'Market by 2030'},{val:'8/8',label:'Gap in Luxury'}]}/>
      <div style={{display:'flex',gap:16,marginBottom:18,alignItems:'center',flexWrap:'wrap'}}>
        {PRESENCE.map(p=>(
          <div key={p.label} style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:9,height:9,borderRadius:'50%',background:p.tc,opacity:0.85}}/>
            <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:C.muted}}>{p.label}</span>
          </div>
        ))}
        <div style={{marginLeft:'auto',fontFamily:"'IBM Plex Mono',monospace",fontSize:9,color:C.dim}}>{SPORT_SHORT.join(' · ')}</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(255px,1fr))',gap:10}}>
        {CATEGORIES.map((cat,i)=>{
          const isOpen=sel===i
          const gapTc=cat.gap>=7?PRESENCE[0].tc:cat.gap>=5?C.accent:PRESENCE[2].tc
          const gapBg=cat.gap>=7?PRESENCE[0].bg:cat.gap>=5?PRESENCE[1].bg:PRESENCE[2].bg
          return(
            <div key={cat.name} className="fade"
              style={{animationDelay:`${i*0.04}s`,background:isOpen?C.card:C.surface,
                border:`1px solid ${isOpen?C.accentDim:C.border}`,borderRadius:8,
                padding:'15px 16px',cursor:'pointer',transition:'all 0.15s'}}
              onClick={()=>setSel(isOpen?null:i)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:500,color:C.text,flex:1,lineHeight:1.2,paddingRight:10}}>{cat.name}</div>
                <div style={{flexShrink:0,fontFamily:"'IBM Plex Mono',monospace",fontSize:9,background:gapBg,color:gapTc,padding:'2px 8px',borderRadius:4,whiteSpace:'nowrap'}}>{cat.gap}/8 gap</div>
              </div>
              <div style={{display:'flex',gap:7}}>
                {cat.presence.map((p,si)=>(
                  <div key={si} title={`${SPORTS[si]}: ${PRESENCE[p].label}`}
                    style={{width:10,height:10,borderRadius:'50%',flexShrink:0,background:PRESENCE[p].tc,opacity:p===0?0.2:p===1?0.6:1}}/>
                ))}
              </div>
              {isOpen&&(
                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12,marginTop:12}}>
                  <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,fontStyle:'italic',color:C.muted,lineHeight:1.75}}>{cat.insight}</p>
                </div>
              )}
            </div>
          )
        })}
      </div>
    </div>
  )
}

// ── ATHLETES ──────────────────────────────────────────────────
function Athletes(){
  const[sel,setSel]=useState(null)
  const[filter,setFilter]=useState('All')
  const sports=['All',...new Set(ATHLETES.map(a=>a.sport))]
  const filtered=filter==='All'?ATHLETES:ATHLETES.filter(a=>a.sport===filter)
  const TIER_C={S:{c:'#FFD168',bg:'#3D2E00'},A:{c:C.accent,bg:C.accentDim+'50'},B:{c:'#8BA88B',bg:'#1F3020'},C:{c:C.muted,bg:C.card}}
  return(
    <div>
      <SectionHeader title="Athlete Intelligence" sub="Commercial profiles, brand gaps, and US market viability"/>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:20}}>
        {sports.map(s=>(
          <button key={s} onClick={()=>{setFilter(s);setSel(null)}} style={{
            fontFamily:"'IBM Plex Mono',monospace",fontSize:10,padding:'5px 14px',borderRadius:4,
            border:`1px solid ${filter===s?C.accent:C.border}`,
            background:filter===s?C.accentFaint:'transparent',
            color:filter===s?C.accent:C.muted,
          }}>{s}</button>
        ))}
      </div>
      <StatRow stats={[{val:'8',label:'Profiled'},{val:'1',label:'With 10+ brands'},{val:'2',label:'Zero sponsors'},{val:'95',label:'Top US score'}]}/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(265px,1fr))',gap:10}}>
        {filtered.map((a,i)=>{
          const isOpen=sel===i
          const tc=TIER_C[a.tier]
          return(
            <div key={a.name} className="fade"
              style={{animationDelay:`${i*0.05}s`,background:isOpen?C.card:C.surface,
                border:`1px solid ${isOpen?C.accentDim:C.border}`,borderRadius:8,
                padding:'15px 16px',cursor:'pointer',transition:'all 0.15s'}}
              onClick={()=>setSel(isOpen?null:i)}>

                <div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:C.text}}>{a.name}</div>
                  <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,color:C.muted,marginTop:2}}>{a.sport} · {a.following} followers</div>
                </div>
                <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,border:`1px solid ${tc.c}`,background:tc.bg,color:tc.c,padding:'2px 8px',borderRadius:4,height:'fit-content',flexShrink:0}}>{a.tier}-tier</div>
              </div>
              <div style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,color:C.muted,letterSpacing:'0.06em'}}>US MARKET SCORE</span>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:C.accent}}>{a.usScore}/100</span>
                </div>
                <div style={{height:3,background:C.dim,borderRadius:2}}>
                  <div style={{height:'100%',width:`${a.usScore}%`,background:`linear-gradient(to right,${C.accentDim},${C.accent})`,borderRadius:2}}/>
                </div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontFamily:"'IBM Plex Mono',monospace",fontSize:9,color:C.muted}}>
